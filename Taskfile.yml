# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    desc: Build the local CLI executable
    cmds:
      - go build -o ascii_art.exe .

  build-wasm:
    desc: Compile Go decoder to WebAssembly and extract wasm_exec.js
    cmds:
      - cmd: go build -o data/main.wasm .
        env:
          GOOS: js
          GOARCH: wasm
      - cmd: powershell -Command "Copy-Item (Join-Path (go env GOROOT) 'lib/wasm/wasm_exec.js') -Destination 'data/wasm_exec.js' -Force"
        platforms: [windows]
      - cmd: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" data/wasm_exec.js
        platforms: [linux, darwin]

  compress-image-2x:
    desc: Compress image to GAC with 2x downscaled colors (100 width)
    cmds:
      - go run . compress-image 'data/144356289_p0_master1200.jpg' data/image.gac 100 0.5 2

  compress-image-1x:
    desc: Compress image to GAC preserving original resolution and 1x colors
    cmds:
      - go run . compress-image 'data/144356289_p0_master1200.jpg' data/image_highres.gac orig 1.0 1

  view-image:
    desc: View compressed GAC image in terminal
    cmds:
      - go run . view-image data/image.gac

  export-image-2x-pixel:
    desc: Export 2x compressed image back to pixel PNG
    cmds:
      - go run . export-image data/image.gac data/image_pixel.png pixel

  export-image-2x-render:
    desc: Export 2x compressed image to rendered ASCII glyph PNG
    cmds:
      - go run . export-image data/image.gac data/image_render.png render

  export-image-1x-pixel:
    desc: Export 1x compressed image back to original pixel PNG
    cmds:
      - go run . export-image data/image_highres.gac data/image_highres_pixel.png pixel

  export-image-1x-render:
    desc: Export 1x compressed image to massive ASCII glyph PNG
    cmds:
      - go run . export-image data/image_highres.gac data/image_highres_render.png render

  test-image:
    desc: Run all image compression, viewing, and export tests
    cmds:
      - task: compress-image-2x
      - task: view-image
      - task: export-image-2x-pixel
      - task: export-image-2x-render
      - task: compress-image-1x
      - task: export-image-1x-pixel
      - task: export-image-1x-render

  test-video:
    desc: Run all video generation, compression, and export tests
    cmds:
      - go run . generate-test-frames data/test_frames 60
      - go run . compress-video data/test_frames data/test.gav 30 100 1
      - go run . export-video data/test.gav data/reconstructed_frames pixel
      - cmd: powershell -Command "Remove-Item -Path data/test_frames -Recurse -Force; Remove-Item -Path data/reconstructed_frames -Recurse -Force"
        platforms: [windows]
      - cmd: rm -rf data/test_frames data/reconstructed_frames
        platforms: [linux, darwin]

  test-stream:
    desc: Run mock streaming video pipeline test
    cmds:
      - go run . generate-test-frames data/test_frames 60
      - go run . stream-test-pipe data/test_frames | go run . stream-encode-video 100 30 1 | go run . stream-decode-video
      - cmd: powershell -Command "Remove-Item -Path data/test_frames -Recurse -Force"
        platforms: [windows]
      - cmd: rm -rf data/test_frames
        platforms: [linux, darwin]

  test:
    desc: Run all image, video, and streaming test pipelines
    cmds:
      - task: test-image
      - task: test-video
      - task: test-stream

  clean:
    desc: Clean build artifacts and temporary files
    cmds:
      # Windows Cleanup
      - cmd: powershell -Command "if (Test-Path ascii_art.exe) { Remove-Item ascii_art.exe -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path is-ascii-art-good.exe) { Remove-Item is-ascii-art-good.exe -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/main.wasm) { Remove-Item data/main.wasm -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/wasm_exec.js) { Remove-Item data/wasm_exec.js -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/image.gac) { Remove-Item data/image.gac -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/image_highres.gac) { Remove-Item data/image_highres.gac -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/test.gav) { Remove-Item data/test.gav -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/test_frames) { Remove-Item data/test_frames -Recurse -Force }"
        platforms: [windows]
      - cmd: powershell -Command "if (Test-Path data/reconstructed_frames) { Remove-Item data/reconstructed_frames -Recurse -Force }"
        platforms: [windows]
      # POSIX Cleanup
      - cmd: rm -f ascii_art.exe is-ascii-art-good.exe data/main.wasm data/wasm_exec.js data/image.gac data/image_highres.gac data/test.gav
        platforms: [linux, darwin]
      - cmd: rm -rf data/test_frames data/reconstructed_frames
        platforms: [linux, darwin]