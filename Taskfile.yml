# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  compress:
    desc: Compress image to GAC with default terminal width (100)
    cmds:
      - go run . compress 'data/1234 (5).png' data/1234.gac 100

  compress-highres:
    desc: Compress image to GAC preserving original 1:1 resolution
    cmds:
      - go run . compress 'data/1234 (5).png' data/1234_highres.gac orig

  view:
    desc: View compressed GAC file in terminal with ANSI colors
    cmds:
      - go run . view data/1234.gac

  export-pixel:
    desc: Reconstruct GAC back to low-resolution PNG preserving aspect ratio
    cmds:
      - go run . export data/1234.gac data/1234_pixel.png pixel

  export-render:
    desc: Reconstruct GAC to high-resolution ASCII glyph PNG preserving aspect ratio
    cmds:
      - go run . export data/1234.gac data/1234_render.png render

  export-highres-pixel:
    desc: Reconstruct high-resolution GAC back to pixel PNG at original size
    cmds:
      - go run . export data/1234_highres.gac data/1234_highres_pixel.png pixel

  export-highres-render:
    desc: Reconstruct high-resolution GAC to massive ASCII glyph PNG
    cmds:
      - go run . export data/1234_highres.gac data/1234_highres_render.png render

  test:
    desc: Run standard compression, terminal view, and pixel/render exports
    cmds:
      - task: compress
      - task: view
      - task: export-pixel
      - task: export-render

  test-highres:
    desc: Run high-resolution compression and exports
    cmds:
      - task: compress-highres
      - task: export-highres-pixel
      - task: export-highres-render